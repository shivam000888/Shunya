<!DOCTYPE html>
<html>
<head>
<title>SHUNYA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">SHUNYA</div>

<div class="searchBox">
<input type="text" id="search" placeholder="Search manga...">
<button onclick="searchManga()">🔍</button>
</div>

<button id="loginBtn" onclick="openLogin()">Login</button>

<div id="menu" class="hidden">
<span onclick="toggleMenu()">☰</span>

<div id="menuBox" class="hidden">
<button onclick="logout()">Logout</button>
</div>
</div>

<button onclick="scrollSupport()">Support</button>

</header>

<h2 class="title">Fresh Manga</h2>

<div id="gallery"></div>

<button id="uploadBtn" class="hidden" onclick="openUpload()">＋</button>

<!-- LOGIN -->

<div id="loginPopup" class="popup hidden">

<h2>Login</h2>

<input id="username" placeholder="username">

<input id="password" type="password" placeholder="password">

<button onclick="login()">Login</button>

</div>

<!-- UPLOAD -->

<div id="uploadPopup" class="popup hidden">

<input id="title" placeholder="Manga title">

<input type="file" id="image">

<button onclick="upload()">Upload</button>

</div>

<footer id="support">

<h3>Support</h3>
<p>shivam0008888</p>

<h3>About Me</h3>
<p>I love to write Manga</p>

</footer>

<script src="script.js"></script>

</body>
</html>
